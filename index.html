<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love</title>

    <style>
        body {
            margin: 0;
            background: #0b0b0f;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .text {
            position: absolute;
            color: #ff6b81;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 6px #ff6b81, 0 0 20px #ff6b81;
            transition: all 1.5s ease;
            opacity: 0;
        }

        .alive {
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                opacity: 0.3;
                transform: scale(0.9);
            }

            50% {
                opacity: 1;
                transform: scale(1.15);
            }

            100% {
                opacity: 0.3;
                transform: scale(0.9);
            }
        }

        @media (max-width: 600px) {
            .text {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="heart"></div>

    <audio id="music" src="angel.mp3" loop></audio>

    <script>
        const container = document.getElementById("heart");
        const music = document.getElementById("music");

        let elements = [];
        let width = window.innerWidth;
        let height = window.innerHeight;

        function heartFunction(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y =
                13 * Math.cos(t) -
                5 * Math.cos(2 * t) -
                2 * Math.cos(3 * t) -
                Math.cos(4 * t);

            return { x, y };
        }

        for (let i = 0; i < 160; i++) {
            const el = document.createElement("div");
            el.className = "text";
            el.innerText = "I love you";

            el.style.left = Math.random() * width + "px";
            el.style.top = Math.random() * height + "px";

            container.appendChild(el);
            elements.push(el);
        }

        function assemble() {
            elements.forEach((el, i) => {
                const t = (i / elements.length) * Math.PI * 2;
                const { x, y } = heartFunction(t);

                el.style.left = `${width / 2 + x * (width / 50)}px`;
                el.style.top = `${height / 2 - y * (height / 50)}px`;

                el.style.opacity = 1;

                setTimeout(() => {
                    el.classList.add("alive");
                }, 1500);
            });
        }

        function explode() {
            elements.forEach(el => {
                el.classList.remove("alive");

                el.style.left = Math.random() * width + "px";
                el.style.top = Math.random() * height + "px";

                el.style.opacity = 0.1;
            });
        }

        function loop() {
            assemble();

            setTimeout(() => {
                explode();
            }, 10000);

            setTimeout(() => {
                loop();
            }, 13000);
        }

        loop();

        music.volume = 0.6;
        music.preload = "auto";

        function tryPlay() {
            music.currentTime = 60;
            music.play().catch(() => { });
        }

        tryPlay();

        ["click", "touchstart", "mousemove", "scroll"].forEach(event => {
            document.addEventListener(event, () => {
                tryPlay();
            }, { once: true });
        });


    </script>

</body>
</html>
